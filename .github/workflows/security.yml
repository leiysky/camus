name: Security audit

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml
      - Cargo.lock
      - deny.toml
      - fuzz/Cargo.toml
      - fuzz/Cargo.lock
      - benchmarks/Cargo.toml
      - benchmarks/Cargo.lock
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - deny.toml
      - fuzz/Cargo.toml
      - fuzz/Cargo.lock
      - benchmarks/Cargo.toml
      - benchmarks/Cargo.lock
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.20.2
      - name: Audit crate dependencies
        run: cargo audit --deny warnings
      - name: Audit fuzz dependencies
        run: cargo audit --deny warnings --file fuzz/Cargo.lock
      - name: Audit benchmark dependencies
        run: cargo audit --deny warnings --file benchmarks/Cargo.lock
      - name: Check dependency licenses and sources
        run: |
          cargo deny --locked check -A license-not-encountered licenses sources
          cargo deny --locked --manifest-path fuzz/Cargo.toml check licenses sources
          cargo deny --locked --manifest-path benchmarks/Cargo.toml \
            --no-default-features --features redb-engine \
            check -A license-not-encountered licenses sources
