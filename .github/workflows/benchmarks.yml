name: Benchmark harness

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Toolchain
        run: rustup show active-toolchain
      - name: Format
        run: cargo fmt --all --check --manifest-path benchmarks/Cargo.toml
      - name: Clippy
        run: >-
          cargo clippy --locked --manifest-path benchmarks/Cargo.toml
          --all-targets --no-default-features --features redb-engine -- -D warnings
      - name: Unit tests
        run: >-
          cargo test --locked --manifest-path benchmarks/Cargo.toml
          --no-default-features --features redb-engine
      - name: Correctness smoke
        run: >-
          cargo run --locked --release --manifest-path benchmarks/Cargo.toml
          --no-default-features --features redb-engine -- run
          --engines camus,simple-append-file,redb --profile smoke
          --data-directory target/benchmark-ci-data
          --output target/benchmark-results/ci-smoke.json
